    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: #ffffff;
            color: #1a1a1a;
            padding: 2.5rem 2rem;
            max-width: 720px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 1.2em; margin: 0 0 5px 0; color: #1a1a1a; }
        .header .progress { color: #666; font-size: 0.9em; margin: 0; }
        .mode-badge { display: inline-block; background: #3B82F6; color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.8em; }
        .save-status { font-size: 0.8em; color: #28a745; height: 1em; }

        .instructions {
            font-size: 1rem;
            margin-bottom: 2rem;
            color: #1a1a1a;
        }

        .instructions strong {
            font-weight: 700;
        }

        .question-card {
            display: flex;
            align-items: flex-start;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .question-number {
            font-size: 2.5rem;
            line-height: 1;
            color: #3B82F6;
            min-width: 2rem;
            flex-shrink: 0;
        }

        .question-body {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            max-width: 100%;
            overflow-wrap: break-word;
        }

        .question-string {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.05rem;
            letter-spacing: 0.01em;
            white-space: pre-wrap;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        .choices {
            display: flex;
            flex-wrap: wrap;
            gap: 2.5rem;
            max-width: 100%;
        }

        .choice {
            display: inline-flex;
            gap: 0.35rem;
            font-size: 1rem;
            cursor: pointer;
        }

        .choice-letter {
            color: #3B82F6;
        }

        .choice-value {
            color: #1a1a1a;
        }

        /* Interactive states */
        .choice-label.selected .choice-letter { text-decoration: underline; }
        .choice-label.correct .choice-value { color: #16a34a; font-weight: 700; }
        .choice-label.incorrect .choice-value { color: #dc2626; text-decoration: line-through; }
        .choice-label.show-correct .choice-value { color: #16a34a; font-weight: 700; }

        /* Choice label styling for clickable choices */
        .choice-label {
            display: inline-flex;
            gap: 0.35rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            position: relative;
        }

        .choice-label:hover { background-color: #f0f0f0; }
        .choice-label.selected { background-color: #e8f0fe; }
        .choice-label.show-correct { background-color: #d4edda; }
        .choice-label.incorrect { background-color: #f8d7da; }

        /* Hide native input but keep it functional */
        .choice-label input[type="radio"],
        .choice-label input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .next-hint { color: #666; margin-top: 10px; font-style: italic; font-size: 0.9em; }

        .summary { background-color: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 15px; text-align: center; }
        .summary h2 { margin: 0 0 10px 0; font-size: 1.2em; }
        .summary .score-display { font-size: 2.5em; font-weight: bold; margin: 10px 0; }
        .summary .score-percent { font-size: 1.1em; color: #666; margin-bottom: 10px; }
        .summary table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        .summary th, .summary td { border: 1px solid #ddd; padding: 6px; text-align: left; }
        .summary th { background-color: #f5f5f5; }
        button { padding: 12px 24px; font-size: 1em; background-color: #3B82F6; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 15px; }
        button:hover { background-color: #2563eb; }
        .continue-btn { background-color: #28a745; }
        .continue-btn:hover { background-color: #218838; }

        /* Confetti */
        .confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 1000; }
        .confetti-piece { position: absolute; width: 10px; height: 30px; top: -10px; animation: fall 3s linear forwards; }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        .streamer { position: absolute; top: 0; width: 5px; height: 100px; animation: streamer-drop 4s ease-out forwards; transform-origin: top center; }
        @keyframes streamer-drop {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>

        function isTwoAnswerQuestion(q) {
            return Array.isArray(q.answer) && q.answer.length > 1;
        }

        function getCorrectLetters(answer) {
            if (Array.isArray(answer)) {
                return answer.map(a => {
                    const match = a.trim().match(/^([A-Z])\s*/);
                    return match ? match[1] : null;
                }).filter(Boolean);
            }
            // Fallback for legacy string format
            const letters = [];
            const parts = answer.split('|');
            parts.forEach(part => {
                const match = part.trim().match(/^([A-Z])\s*/);
                if (match) letters.push(match[1]);
            });
            return letters;
        }

        function getChoiceLetter(choice) {
            const match = choice.match(/^([A-Z])\s+(.+)$/);
            return match ? match[1] : null;
        }

        function getChoiceText(choice) {
            const match = choice.match(/^([A-Z])\s+(.+)$/);
            return match ? match[2] : choice;
        }

        function formatInstructions(text) {
            return text
                .replace(/\n/g, '<br>')
                .replace(/\bsame\b/g, '<strong>same</strong>')
                .replace(/\bboth\b/g, '<strong>both</strong>');
        }

        function parseChoice(choice) {
            const match = choice.match(/^([A-Z])\s+(.+)$/);
            if (match) {
                return { letter: match[1], value: match[2] };
            }
            return { letter: null, value: choice };
        }

        function renderQuestion() {
            const q = questions[currentIndex];
            const container = document.getElementById('questionContainer');
            const modeBadge = document.getElementById('modeBadge');

            const qNum = (currentIndex % SUMMARY_INTERVAL) + 1;
            document.getElementById('progress').textContent = `${qNum}/${SUMMARY_INTERVAL}`;

            modeBadge.textContent = firstPassComplete ? 'Review' : '';
            modeBadge.style.display = firstPassComplete ? 'inline-block' : 'none';

            displayedAt = Date.now();
            selections = [];

            const maxSelections = isTwoAnswerQuestion(q) ? 2 : 1;

            let choicesHtml = '';
            q.choices.forEach((choice, idx) => {
                const { letter, value } = parseChoice(choice);
                const inputId = `choice-${currentIndex}-${idx}`;

                if (letter) {
                    choicesHtml += `
                        <label class="choice-label" data-letter="${letter}" for="${inputId}">
                            <input type="${isTwoAnswerQuestion(q) ? 'checkbox' : 'radio'}" id="${inputId}" name="choice" value="${letter}">
                            <span class="choice-letter">${letter}</span><span class="choice-value">${value}</span>
                        </label>
                    `;
                } else {
                    choicesHtml += `
                        <label class="choice-label">
                            <input type="${isTwoAnswerQuestion(q) ? 'checkbox' : 'radio'}" id="${inputId}" name="choice" value="${choice}">
                            <span class="choice-value">${value}</span>
                        </label>
                    `;
                }
            });

            container.innerHTML = `
                <div class="instructions">${formatInstructions(q.instructions)}</div>
                <div class="question-card">
                    <div class="question-number">${q.number}</div>
                    <div class="question-body">
                        <div class="question-string">${q.question}</div>
                        <div class="choices" role="group">${choicesHtml}</div>
                    </div>
                </div>
                <div class="next-hint" id="nextHint"></div>
            `;

            const labels = document.querySelectorAll('.choice-label');
            labels.forEach(label => {
                label.addEventListener('click', handleSelection);
            });

            showingResult = false;
        }

        function handleSelection(e) {
            if (showingResult) return;

            const q = questions[currentIndex];
            const maxSelections = isTwoAnswerQuestion(q) ? 2 : 1;

            const checked = Array.from(document.querySelectorAll('input[name="choice"]:checked'))
                .map(input => input.value);

            selections = checked;

            // Update visual selection state
            const labels = document.querySelectorAll('.choice-label');
            labels.forEach(label => {
                const input = label.querySelector('input');
                if (input && input.checked) {
                    label.classList.add('selected');
                } else {
                    label.classList.remove('selected');
                }
            });

            const hint = document.getElementById('nextHint');

            if (checked.length < maxSelections) {
                hint.textContent = `Pick ${maxSelections - checked.length} more`;
            } else {
                hint.textContent = '';
                setTimeout(() => processAnswer(), 300);
            }
        }

        function processAnswer() {
            if (showingResult) return;

            const q = questions[currentIndex];
            const correctLetters = getCorrectLetters(q.answer);
            const maxSelections = isTwoAnswerQuestion(q) ? 2 : 1;

            answeredAt = Date.now();

            const correct = selections.length === correctLetters.length &&
                selections.every(s => correctLetters.includes(s));
            results.push({
                questionId: q.id,
                displayedAt: displayedAt,
                answeredAt: answeredAt,
                selectedAnswer: selections.join(', '),
                correctAnswer: correctLetters.join(', '),
                correct: correct
            });

            saveState();

            const labels = document.querySelectorAll('.choice-label');
            labels.forEach(label => {
                const letter = label.dataset.letter;
                if (correctLetters.includes(letter)) {
                    label.classList.add('show-correct');
                }
                if (selections.includes(letter) && !correctLetters.includes(letter)) {
                    label.classList.add('incorrect');
                }
            });

            showingResult = true;
            setTimeout(() => advanceQuestion(), 1500);
        }

        function advanceQuestion() {
            showingResult = false;
            currentIndex++;

            // Check if we need to show summary (every 6 questions)
            if (currentIndex > 0 && currentIndex % SUMMARY_INTERVAL === 0) {
                showSectionSummary();
            } else if (currentIndex >= questions.length) {
                if (firstPassComplete) {
                    showFinalSummary();
                } else {
                    currentIndex = 0;
                    firstPassComplete = true;
                    renderQuestion();
                }
            } else {
                renderQuestion();
            }
        }

        function showSectionSummary() {
            const container = document.getElementById('questionContainer');
            const sectionNum = Math.ceil(currentIndex / SUMMARY_INTERVAL);
            const sectionResults = results.slice(-SUMMARY_INTERVAL);
            const correctCount = sectionResults.filter(r => r.correct).length;
            const percent = Math.round((correctCount / SUMMARY_INTERVAL) * 100);
            const passed = percent >= 80;

            let resultsTable = `
                <table>
                    <tr>
                        <th>#</th>
                        <th>Ans</th>
                        <th>OK</th>
                        <th>Time</th>
                    </tr>
            `;
            sectionResults.forEach((r, idx) => {
                const timeTaken = ((r.answeredAt - r.displayedAt) / 1000).toFixed(1);
                const globalIdx = results.length - SUMMARY_INTERVAL + idx + 1;
                resultsTable += `
                    <tr>
                        <td>${globalIdx}</td>
                        <td>${r.selectedAnswer}</td>
                        <td>${r.correct ? 'Y' : 'N'}</td>
                        <td>${timeTaken}s</td>
                    </tr>
                `;
            });
            resultsTable += '</table>';

            const confettiHtml = passed ? createConfetti() : '';

            container.innerHTML = `
                ${confettiHtml}
                <div class="summary">
                    <h2>Section ${sectionNum}</h2>
                    <div class="score-display">${correctCount}/${SUMMARY_INTERVAL}</div>
                    <div class="score-percent">${percent}%</div>
                    ${resultsTable}
                    ${passed ? '<p style="color: #28a745; font-weight: bold;">80%+ Great job!</p>' : '<p>Keep practicing!</p>'}
                    <button class="continue-btn" onclick="continueToNextSection()">Next Section</button>
                </div>
            `;
            document.getElementById('progress').textContent = `Section ${sectionNum} Done`;
            document.getElementById('modeBadge').style.display = 'none';
            saveState();
        }

        function createConfetti() {
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffa500', '#ff69b4'];
            let html = '<div class="confetti-container"><div style="position:absolute;width:100%;height:100%">';

            // Add confetti pieces
            for (let i = 0; i < 50; i++) {
                const color = colors[Math.floor(Math.random() * colors.length)];
                const left = Math.random() * 100;
                const delay = Math.random() * 2;
                const size = Math.random() * 10 + 5;
                html += `<div class="confetti-piece" style="
                    left: ${left}%;
                    background: ${color};
                    width: ${size}px;
                    height: ${size * 3}px;
                    animation-delay: ${delay}s;
                "></div>`;
            }

            // Add streamers
            for (let i = 0; i < 20; i++) {
                const color = colors[Math.floor(Math.random() * colors.length)];
                const left = Math.random() * 100;
                const delay = Math.random() * 1.5;
                html += `<div class="streamer" style="
                    left: ${left}%;
                    background: linear-gradient(to bottom, ${color}, transparent);
                    animation-delay: ${delay}s;
                "></div>`;
            }

            html += '</div></div>';
            return html;
        }

        function continueToNextSection() {
            if (currentIndex >= questions.length) {
                if (firstPassComplete) {
                    showFinalSummary();
                } else {
                    currentIndex = 0;
                    firstPassComplete = true;
                    renderQuestion();
                }
            } else {
                renderQuestion();
            }
        }

        function showFinalSummary() {
            const container = document.getElementById('questionContainer');
            const correctCount = results.filter(r => r.correct).length;
            const percent = Math.round((correctCount / results.length) * 100);
            const passed = percent >= 80;

            let resultsTable = '';
            if (results.length > 0) {
                resultsTable = `
                    <table>
                        <tr>
                            <th>#</th>
                            <th>Ans</th>
                            <th>OK</th>
                            <th>Time</th>
                        </tr>
                `;
                results.forEach((r, idx) => {
                    const timeTaken = ((r.answeredAt - r.displayedAt) / 1000).toFixed(1);
                    resultsTable += `
                        <tr>
                            <td>${idx + 1}</td>
                            <td>${r.selectedAnswer}</td>
                            <td>${r.correct ? 'Y' : 'N'}</td>
                            <td>${timeTaken}s</td>
                        </tr>
                    `;
                });
                resultsTable += '</table>';
            }

            const confettiHtml = passed ? createConfetti() : '';

            container.innerHTML = `
                ${confettiHtml}
                <div class="summary">
                    <h2>Complete!</h2>
                    <div class="score-display">${correctCount}/${results.length}</div>
                    <div class="score-percent">${percent}%</div>
                    ${resultsTable}
                    ${passed ? '<p style="color: #28a745; font-weight: bold;">80%+ Excellent!</p>' : '<p>Keep practicing!</p>'}
                    <button onclick="startReview()">Review</button>
                </div>
            `;
            document.getElementById('progress').textContent = 'Done';
            document.getElementById('modeBadge').style.display = 'none';
            clearSavedState(); // Clean up when test is complete
        }

        function startReview() {
            currentIndex = 0;
            firstPassComplete = true;
            showingResult = false;
            results = [];
            clearSavedState();
            renderQuestion();
        }

        // Start - check if we have saved progress
        function init() {
            if (savedState && savedState.results && savedState.results.length > 0) {
                // Show resume dialog or just continue
                if (confirm(`Resume from where you left off? (Question ${savedState.currentIndex + 1})`)) {
                    renderQuestion();
                } else {
                    // Start fresh
                    currentIndex = 0;
                    results = [];
                    firstPassComplete = false;
                    clearSavedState();
                    renderQuestion();
                }
            } else {
                renderQuestion();
            }
        }

        init();
    </script>
